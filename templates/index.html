<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Glycemic Control - AI Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">AI-Powered Glycemic Control for Diabetes</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="card p-4">
                    <h3 class="card-title mb-3">Enter Your Health Data</h3>
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" name="age" required>
                    </div>
                    <div class="mb-3">
                        <label for="bmi" class="form-label">BMI</label>
                        <input type="number" step="0.1" class="form-control" id="bmi" name="bmi" required>
                    </div>
                    <div class="mb-3">
                        <label for="insulin_intake" class="form-label">Insulin Intake (units)</label>
                        <input type="number" step="0.1" class="form-control" id="insulin_intake" name="insulin_intake" required>
                    </div>
                    <div class="mb-3">
                        <label for="blood_pressure" class="form-label">Blood Pressure (systolic)</label>
                        <input type="number" class="form-control" id="blood_pressure" name="blood_pressure" required>
                    </div>
                    <div class="mb-3">
                        <label for="diabetes_status" class="form-label">Diabetes Status</label>
                        <select class="form-select" id="diabetes_status" name="diabetes_status" required>
                            <option value="0">Non-Diabetic</option>
                            <option value="1">Diabetic</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Predict Glucose Level</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/reporting" class="btn btn-secondary">View Glucose Trends Report</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

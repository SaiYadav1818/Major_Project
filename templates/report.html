<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucose Trends Report - Diabetes Glycemic Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e6f3ff 0%, #f0f8ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
        }
        h1 {
            color: #1a3d5c;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }
        .card-title {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.5rem;
        }
        .btn {
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 0 15px;
            }
            .card {
                margin: 1rem 0;
            }
        }
    </style>
</head>
<body style="background-color: #e6f3ff;">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Glucose Trends Report</h1>
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card p-4">
                    <h3 class="card-title mb-3">Glucose Level Trends</h3>
                    <div id="glucose-chart"></div>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/" class="btn btn-primary">Back to Prediction</a>
        </div>
    </div>
    <script>
        // Embed the Plotly chart
        {{ plot_html|safe }}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
